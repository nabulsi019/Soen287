<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Smart Course Companion</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header>
    <nav class="primary-nav" data-nav>
                  <a class="brand" href="index.html">
        <img src="assets/img/concordia-logo.png" alt="Concordia" class="nav-logo" onerror="this.style.display='none'" />
        <span>Smart Course Companion</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul></ul>
    </nav>
  </header>
  <main class="container auth-page">
    <nav id="breadcrumb" class="breadcrumb-nav"></nav>
    <h1>Log In</h1>
    <form class="card" data-form="login">
      <label>Email
        <input type="email" name="email" required />
      </label>
      <label>Password
        <input type="password" name="password" required minlength="8" />
      </label>
      <button type="submit" class="btn">Sign In</button>
      <p class="helper-text">No account? <a href="register.html">Register here</a>.</p>
      <p class="helper-text" id="loginFeedback"></p>
    </form>
  </main>
  <footer>
    <small>&copy; 2026 Smart Course Companion</small>
  </footer>
  <script>
    document.querySelector('[data-form="login"]').addEventListener('submit', function (e) {
      e.preventDefault();
      var form     = e.target;
      var email    = form.querySelector('[name="email"]').value.trim().toLowerCase();
      var password = form.querySelector('[name="password"]').value;
      var feedback = document.getElementById('loginFeedback');

      feedback.textContent = '';

      // Send credentials to the server via fetch (AJAX)
      fetch('/api/auth/login', {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'include',                             // send/receive session cookie
        body:        JSON.stringify({ email: email, password: password })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.error) {
          localStorage.removeItem('scc_currentUser');
          localStorage.removeItem('scc_loggedIn');
          feedback.textContent = data.error;
          feedback.setAttribute('data-state', 'error');
          return;
        }

        localStorage.setItem('scc_currentUser', JSON.stringify(data.user));
        localStorage.setItem('scc_loggedIn', 'true');
        feedback.textContent = 'Login successful! Redirecting...';
        feedback.setAttribute('data-state', 'success');
        setTimeout(function () {
          window.location.href = data.user.role === 'admin'
            ? 'admin-dashboard.html'
            : 'student-dashboard.html';
        }, 1000);
      })
      .catch(function () {
        localStorage.removeItem('scc_currentUser');
        localStorage.removeItem('scc_loggedIn');
        feedback.textContent = 'Could not reach the server. Is it running?';
        feedback.setAttribute('data-state', 'error');
      });
    });
  </script>
  <script src="assets/session.js"></script>
  <script src="assets/nav.js"></script>
</body>
</html>
