<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Course | Smart Course Companion</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header>
    <nav class="primary-nav" data-nav>
                  <a class="brand" href="index.html">
        <img src="assets/img/concordia-logo.png" alt="Concordia" class="nav-logo" onerror="this.style.display='none'" />
        <span>Smart Course Companion</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul>
        <li><a href="index.html" data-role="public">Home Page</a></li>
        <li><a href="login.html" data-role="public">Login</a></li>
        <li><a href="register.html" data-role="public">Register</a></li>
        <li><a href="student-dashboard.html" data-role="student">Student Dashboard</a></li>
        <li><a href="admin-dashboard.html" data-role="admin">Admin Dashboard</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <section class="page-header">
      <span class="page-tag">Admin</span>
      <h1>Create Course</h1>
      <p>Define a new course for students to enroll in.</p>
    </section>
    <section class="layout">
      <form class="card" data-form="admin-course">
        <h2>Course Details</h2>
        <input type="hidden" name="courseId" />
        <label>Course Code
          <input type="text" name="code" placeholder="e.g., COMP 890" required />
        </label>
        <label>Title
          <input type="text" name="title" placeholder="e.g., Advanced Software Engineering" required />
        </label>
        <label>Credits
          <input type="number" name="credits" min="0" step="1" required />
        </label>
        <label>Term
          <select name="term" required>
            <option value="winter-2026">Winter 2026</option>
            <option value="summer-2026">Summer 2026</option>
            <option value="fall-2026">Fall 2026</option>
            <option value="winter-2027">Winter 2027</option>
          </select>
        </label>
        <label>Description
          <textarea name="description" rows="4" required></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn">Save Course</button>
          <button type="button" class="btn btn-secondary" data-action="reset-admin-course-form">Clear</button>
        </div>
        <p class="helper-text" id="adminCourseFeedback"></p>
      </form>
    </section>
  </main>
  <footer>
    <small>&copy; 2026 Smart Course Companion</small>
  </footer>
  <script>
    document.querySelector('[data-form="admin-course"]').addEventListener('submit', function (e) {
      e.preventDefault();
      const form = e.target;

      // Build course object; enabled:true makes it visible to students immediately
      const course = {
        id: Date.now(),  // timestamp used as unique id
        code: form.querySelector('[name="code"]').value.trim(),
        title: form.querySelector('[name="title"]').value.trim(),
        credits: Number(form.querySelector('[name="credits"]').value),
        term: form.querySelector('[name="term"]').value,
        description: form.querySelector('[name="description"]').value.trim(),
        enabled: true
      };

      // Append to admin course list in localStorage
      const courses = JSON.parse(localStorage.getItem('adminCourses') || '[]');
      courses.push(course);
      localStorage.setItem('adminCourses', JSON.stringify(courses));

      const feedback = document.getElementById('adminCourseFeedback');
      feedback.textContent = 'Course saved successfully! Redirecting...';
      feedback.style.color = 'green';
      setTimeout(function () {
        window.location.href = 'admin-dashboard.html';
      }, 1500);
    });
  </script>
</body>
</html>
